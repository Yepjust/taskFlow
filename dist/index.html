<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.png" type="image/png">
<title>TaskFlow</title>
<script src="react.production.min.js"></script>
<script src="react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit}
input,textarea{font-family:inherit;font-size:inherit}
textarea{resize:vertical}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.04)}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.18);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.28)}

/* Layout */
.app{display:flex;height:100vh;width:100vw;transition:background-color .4s}
.sidebar{display:flex;flex-direction:column;height:100%;border-right:1px solid #e5e7eb;transition:width .2s;position:relative;z-index:30;flex-shrink:0}
.sidebar.expanded{width:272px}
.sidebar.collapsed{width:56px}
.sidebar-header{padding:14px 12px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;min-height:56px}
.logo{font-weight:700;font-size:17px;color:#4f46e5;display:flex;align-items:center;gap:8px;white-space:nowrap}
.sidebar-body{padding:12px;display:flex;flex-direction:column;gap:10px}
.btn-create{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;color:#fff;padding:8px 14px;border-radius:8px;font-weight:500;transition:background .15s, opacity .15s;white-space:nowrap}
.btn-create:hover{filter:brightness(.92)}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9ca3af;pointer-events:none}
.search-input{width:100%;padding:7px 10px 7px 32px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;outline:none;transition:border .15s,box-shadow .15s}
.search-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.boards-list{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:3px}
.board-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid transparent;position:relative}
.board-item:hover{background:#f9fafb}
.board-item.active{background:#eef2ff;border-color:#c7d2fe}
.board-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.board-name{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#374151}
.board-item.active .board-name{color:#4338ca}
.btn-del-board{padding:4px;border-radius:5px;color:#9ca3af;transition:all .15s;opacity:0;flex-shrink:0}
.board-item:hover .btn-del-board{opacity:1}
.btn-del-board:hover{background:#fee2e2;color:#dc2626}
.sidebar-footer{padding:12px;border-top:1px solid #f3f4f6;display:flex;align-items:center;gap:8px}
.btn-lang{display:flex;align-items:center;gap:6px;font-size:12px;color:#9ca3af;white-space:nowrap;transition:color .15s}
.btn-lang:hover{color:#4f46e5}

/* Main */
.main{flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden}
.topbar{height:56px;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(229,231,235,.5);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:20}
.board-title-input{font-size:18px;font-weight:700;background:transparent;border:none;outline:none;border-radius:6px;padding:4px 6px;transition:background .15s}
.board-title-input:focus{background:#f9fafb}
.topbar-actions{display:flex;gap:6px}
.btn-icon{padding:7px;border-radius:8px;color:#6b7280;transition:all .15s}
.btn-icon:hover{background:#f3f4f6;color:#374151}
.btn-theme{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;transition:all .15s}
.btn-theme:hover{filter:brightness(.95)}

/* Board */
.board-area{flex:1;overflow-x:auto;overflow-y:hidden;padding:20px}
.columns-wrap{display:flex;gap:20px;height:100%;align-items:flex-start}
.column{flex-shrink:0;width:288px;display:flex;flex-direction:column;height:100%;max-height:100%;border-radius:12px;min-height:0}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 6px}
.col-title-wrap{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.5);border-radius:8px;padding:5px 8px;margin-right:8px;border:1px solid transparent;transition:all .15s}
.col-title-wrap:focus-within{border-color:#a5b4fc;background:#fff}
.col-title{background:transparent;border:none;outline:none;font-weight:700;color:#374151;width:100%}
.col-count{font-size:11px;font-weight:600;background:rgba(255,255,255,.7);color:#6b7280;padding:2px 8px;border-radius:20px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.btn-del-col{padding:4px;border-radius:5px;color:#9ca3af;opacity:0;transition:all .15s}
.column:hover .btn-del-col{opacity:1}
.btn-del-col:hover{background:#fee2e2;color:#dc2626}
.tasks-list{flex:1 1 0;min-height:0;overflow-y:auto;padding-right:4px;display:flex;flex-direction:column;gap:10px;padding-bottom:12px}
.task-card{background:#fff;padding:14px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #f3f4f6;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;min-height:72px;flex-shrink:0}
.task-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);border-color:#c7d2fe;transform:translateY(-1px)}
.task-accent{position:absolute;top:0;left:0;width:3px;height:100%}
.task-content{padding-left:8px}
.task-title{font-weight:500;color:#1f2937;line-height:1.4;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.task-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#9ca3af}
.task-subtask-count{display:flex;align-items:center;gap:4px}
.btn-add-task{width:100%;padding:8px;border:2px dashed rgba(156,163,175,.4);border-radius:10px;color:#6b7280;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:500;flex-shrink:0}
.btn-add-task:hover{border-color:#818cf8;color:#4f46e5;background:rgba(238,242,255,.5)}
.btn-add-col{flex-shrink:0;width:56px;height:100%;max-height:75vh;border-radius:16px;border:2px dashed #d1d5db;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#9ca3af;transition:all .2s}
.btn-add-col:hover{border-color:#818cf8;color:#4f46e5;background:rgba(255,255,255,.5)}
.btn-add-col-inner{padding:10px;border-radius:50%;background:#f3f4f6;transition:background .15s}
.btn-add-col:hover .btn-add-col-inner{background:#eef2ff}

/* Welcome */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9ca3af;text-align:center;padding:32px}
.welcome-icon{width:80px;height:80px;background:#f3f4f6;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.welcome h2{font-size:22px;font-weight:700;color:#374151;margin-bottom:8px}

/* Modal backdrop */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:40;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;animation:zoomIn .15s ease}
@keyframes zoomIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* Task Modal */
.task-modal{width:100%;max-width:800px;height:85vh;display:flex;position:relative}
.task-modal-main{flex:1;display:flex;flex-direction:column;min-width:0}
.task-modal-header{padding:20px 24px;border-bottom:1px solid #f3f4f6;display:flex;align-items:flex-start;justify-content:space-between;background:#fff;z-index:10}
.task-id{font-size:11px;font-family:monospace;color:#9ca3af;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.task-id-dot{width:10px;height:10px;border-radius:50%}
.task-title-big{font-size:22px;font-weight:700;color:#1f2937;border:none;outline:none;width:100%;border-radius:6px;padding:3px 4px;background:transparent}
.task-title-big:focus{background:#f9fafb}
.btn-del-task{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;color:#f87171;font-size:13px;font-weight:500;transition:all .15s}
.btn-del-task:hover{background:#fef2f2;color:#dc2626}
.btn-close{padding:7px;border-radius:50%;color:#6b7280;transition:all .15s}
.btn-close:hover{background:#f3f4f6}
.task-modal-body{flex:1;overflow-y:auto;padding:28px;background:#fff}
.section-title{font-weight:600;color:#374151;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.progress-bar-wrap{height:10px;background:#f3f4f6;border-radius:10px;overflow:hidden}
.progress-bar{height:100%;border-radius:10px;transition:width .4s ease}
.progress-pct{font-size:22px;font-weight:700}
.details-textarea{width:100%;padding:14px;background:#f9fafb;border:1px solid #f3f4f6;border-radius:12px;color:#374151;outline:none;min-height:90px;transition:border .15s,box-shadow .15s}
.details-textarea:focus{border-color:#a5b4fc;box-shadow:0 0 0 3px rgba(165,180,252,.15)}
.subtask-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid #e5e7eb;transition:all .15s;background:#fff}
.subtask-row.done{background:#fafafa;border-color:#f3f4f6}
.subtask-row:hover{border-color:#c7d2fe;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.drag-handle{color:#d1d5db;padding:6px;border-radius:5px;cursor:grab;transition:all .15s;display:flex;align-items:center}
.drag-handle:hover{background:#f3f4f6;color:#6b7280}
.subtask-check{width:22px;height:22px;border-radius:5px;border:1.5px solid #d1d5db;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:#fff}
.subtask-check.checked{background:#22c55e;border-color:#22c55e;color:#fff}
.subtask-check:hover:not(.checked){border-color:#86efac}
.subtask-input{flex:1;border:none;outline:none;background:transparent;color:#374151}
.subtask-input.done-text{color:#9ca3af;text-decoration:line-through}
.subtask-actions{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .15s}
.subtask-row:hover .subtask-actions{opacity:1}
.btn-subtask-action{padding:6px;border-radius:6px;color:#9ca3af;transition:all .15s}
.btn-subtask-action:hover.del{background:#fee2e2;color:#dc2626}
.btn-subtask-action:hover.expand{background:#eef2ff;color:#4f46e5}
.btn-add-subtask{width:100%;padding:9px;border:2px dashed #e5e7eb;border-radius:12px;color:#9ca3af;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:500;transition:all .15s}
.btn-add-subtask:hover{border-color:#a5b4fc;color:#4f46e5;background:#f5f3ff}
.due-badge{font-size:11px;font-family:monospace;color:#6b7280;background:#f3f4f6;padding:3px 8px;border-radius:5px;display:flex;align-items:center;gap:4px}
.star-badge{color:#fbbf24}

/* Subtask detail panel */
.subtask-panel{position:absolute;top:0;right:0;height:100%;width:300px;background:#fff;border-left:1px solid #e5e7eb;z-index:60;display:flex;flex-direction:column;animation:slideIn .15s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.subtask-panel-header{padding:14px 16px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;background:#f9fafb}
.subtask-panel-body{padding:20px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:20px}
.subtask-notes{width:100%;height:120px;padding:10px;background:#fefce8;border:1px solid #fde68a;border-radius:8px;font-size:13px;outline:none;resize:none}
.subtask-notes:focus{border-color:#fbbf24;box-shadow:0 0 0 3px rgba(251,191,36,.1)}
.date-input{width:100%;padding:7px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none}
.date-input:focus{border-color:#a5b4fc}
.field-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:6px;margin-bottom:6px}

/* Theme picker */
.theme-modal{width:100%;max-width:700px;max-height:80vh;display:flex;flex-direction:column}
.theme-modal-header{padding:16px 20px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between}
.theme-grid{padding:20px;overflow-y:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.theme-btn{padding:10px;border-radius:12px;border:2px solid transparent;display:flex;flex-direction:column;gap:8px;transition:all .15s;position:relative}
.theme-btn:hover{transform:scale(1.04);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.theme-btn.selected{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.theme-swatch{height:44px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.theme-name{font-size:12px;font-weight:500}
.theme-check{position:absolute;top:6px;right:6px;background:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.15)}

/* Confirm modal */
.confirm-modal{width:100%;max-width:360px;padding:24px}
.confirm-modal h3{font-size:16px;font-weight:700;color:#1f2937;margin-bottom:8px}
.confirm-modal p{color:#6b7280;margin-bottom:24px;line-height:1.5}
.confirm-actions{display:flex;justify-content:flex-end;gap:10px}
.btn-cancel{padding:8px 16px;color:#6b7280;border-radius:8px;font-weight:500;transition:background .15s}
.btn-cancel:hover{background:#f3f4f6}
.btn-danger{padding:8px 16px;background:#dc2626;color:#fff;border-radius:8px;font-weight:500;transition:background .15s}
.btn-danger:hover{background:#b91c1c}

/* Import modal */
.import-modal{width:100%;max-width:520px;padding:24px}
.import-tabs{display:flex;gap:8px;margin-bottom:14px}
.import-tab{padding:6px 14px;border-radius:8px;font-weight:500;transition:all .15s;color:#6b7280}
.import-tab.active{background:#eef2ff;color:#4f46e5}
.import-tab:hover:not(.active){background:#f3f4f6}
.import-textarea{width:100%;height:180px;border:1px solid #e5e7eb;border-radius:10px;padding:12px;font-family:monospace;font-size:12px;outline:none;resize:vertical}
.import-textarea:focus{border-color:#a5b4fc;box-shadow:0 0 0 3px rgba(165,180,252,.15)}
.file-input{font-size:13px;color:#6b7280}
.import-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.btn-primary{padding:8px 18px;background:#4f46e5;color:#fff;border-radius:8px;font-weight:500;transition:background .15s}
.btn-primary:hover{background:#4338ca}

/* Undo banner */
.undo-banner{background:#fef9c3;color:#713f12;border-bottom:1px solid #fde68a;padding:8px 16px;font-size:13px;display:flex;align-items:center;justify-content:space-between;z-index:40}
.btn-undo{padding:4px 12px;border-radius:6px;background:#fde68a;font-weight:500;transition:background .15s}
.btn-undo:hover{background:#fcd34d}

/* Centered info overlay */
.info-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;z-index:45;padding:20px}
.info-dialog{background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.18);padding:24px 28px;max-width:360px;text-align:left;font-size:14px;line-height:1.6;color:#374151}
.info-dialog strong{display:block;margin-bottom:8px;font-size:15px;color:#1f2937}
.info-dialog button{margin-top:16px;padding:6px 16px;background:#4f46e5;color:#fff;border-radius:6px;font-weight:500;transition:background .15s}
.info-dialog button:hover{background:#4338ca}

/* Due notification popup */
.due-notification{position:fixed;bottom:24px;right:24px;z-index:50;background:#fff;border:1px solid #fde68a;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.12);padding:16px 20px;max-width:320px;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.due-notification h4{font-size:14px;font-weight:600;color:#92400e;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.due-notification ul{list-style:none;padding:0;margin:0 0 12px;font-size:13px;color:#374151}
.due-notification li{padding:4px 0;border-bottom:1px solid #f3f4f6}
.due-notification li:last-child{border-bottom:none}
.due-notification button{padding:4px 14px;background:#fef3c7;border-radius:6px;font-size:12px;font-weight:500;color:#92400e;transition:background .15s}
.due-notification button:hover{background:#fde68a}

/* Spacing helpers */
.mb8{margin-bottom:8px}
.mb16{margin-bottom:16px}
.mb24{margin-bottom:24px}
.flex{display:flex}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.gap4{gap:4px}
.gap8{gap:8px}
.flex1{flex:1}
</style>
</head>

<div id="root"></div>

const genId=()=>Math.random().toString(36).substr(2,9);
const calcProgress=(task)=>{
  if(!task.subtasks||task.subtasks.length===0)return 0;
  return Math.round(task.subtasks.filter(s=>s.completed).length/task.subtasks.length*100);
};

const removeDiacritics = (str) => str.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
const matchesSearch = (board, term) => {
  const normalizedTerm = removeDiacritics(term.toLowerCase());
  if (removeDiacritics(board.name.toLowerCase()).includes(normalizedTerm)) return true;
  for (const col of board.columns) {
    for (const task of col.tasks) {
      if (removeDiacritics(task.title.toLowerCase()).includes(normalizedTerm)) return true;
      if (task.subtasks) {
        for (const st of task.subtasks) {
          if (removeDiacritics(st.title.toLowerCase()).includes(normalizedTerm)) return true;
        }
      }
    }
  }
  return false;
};

const parseMD=(md)=>{
  const lines=md.split(/\r?\n/);
  let boardName=null,themeId=null,columns=[],currentCol=null,currentTask=null,currentSubtask=null,errors=[];
  lines.forEach((line,idx)=>{
    if(/^#\s+/.test(line)){boardName=line.replace(/^#\s+/,'').trim();return;}
    const mT=line.match(/^>\s*Theme:\s*(.+)$/i);
    if(mT){themeId=mT[1].trim();return;}
    if(/^##\s+/.test(line)){const title=line.replace(/^##\s+/,'').trim();currentCol={id:genId(),title,tasks:[]};columns.push(currentCol);currentTask=null;currentSubtask=null;return;}
    if(/^###\s+/.test(line)){const t=line.replace(/^###\s+/,'').trim();if(!currentCol)errors.push(`Line ${idx+1}: Task without column`);currentTask={id:genId(),title:t,subtasks:[],description:''};currentCol&&currentCol.tasks.push(currentTask);currentSubtask=null;return;}
    const mD=line.match(/^>\s*description:\s*(.*)$/i);
    if(mD){if(currentTask)currentTask.description=mD[1].trim().replace(/\\n/g,'\n');return;}
    const mS=line.match(/^-\s*\[(.|x)\]\s*(.*)$/i);
    if(mS){const completed=mS[1]==='x';currentSubtask={id:genId(),title:mS[2].trim(),completed,details:'',dueDate:''};currentTask&&currentTask.subtasks.push(currentSubtask);return;}
    const mDet=line.match(/^>\s*details:\s*(.*)$/i);
    if(mDet){if(currentSubtask)currentSubtask.details=mDet[1].trim().replace(/\\n/g,'\n');return;}
    const mDue=line.match(/^>\s*due:\s*(.*)$/i);
    if(mDue){if(currentSubtask)currentSubtask.dueDate=mDue[1].trim();return;}
  });
  if(!boardName)return{board:null,errors:['Board name missing']};
  const board={id:genId(),name:boardName,themeId:THEMES.find(t=>t.id===themeId)?themeId:THEMES[0].id,columns};
  if(!columns.length)errors.push('No columns found');
  return{board,errors};
};

function TaskModal({task,onClose,onUpdate,onDelete,t,theme}){
  const[activeStId,setActiveStId]=useState(null);
  const[draggable,setDraggable]=useState(null);
  const progress=calcProgress(task);

  const addSubtask=()=>{
    const st={id:genId(),title:'',completed:false,details:'',dueDate:''};
    onUpdate({...task,subtasks:[...(task.subtasks||[]),st]});
  };
  const toggleSt=id=>{
    onUpdate({...task,subtasks:task.subtasks.map(s=>s.id===id?{...s,completed:!s.completed}:s)});
  };
  const updateSt=st=>{
    onUpdate({...task,subtasks:task.subtasks.map(s=>s.id===st.id?st:s)});
  };
  const deleteSt=id=>{
    onUpdate({...task,subtasks:task.subtasks.filter(s=>s.id!==id)});
    if(activeStId===id)setActiveStId(null);
  };
  const onDragStart=(e,id)=>{
    e.dataTransfer.setData('text/plain', 'subtask:'+id);
    e.dataTransfer.effectAllowed = 'move';
  };
  const onDrop=(e,targetIdx)=>{
    e.preventDefault();e.stopPropagation();
    const raw=e.dataTransfer.getData('text/plain');
    if(!raw)return;
    const [type, id] = raw.split(':');
    if(type!=='subtask' || !id) return;
    const arr=[...task.subtasks];
    const from=arr.findIndex(s=>s.id===id);
    if(from===-1||from===targetIdx)return;
    const[item]=arr.splice(from,1);arr.splice(targetIdx,0,item);
    onUpdate({...task,subtasks:arr});setDraggable(null);
  };

  const activeSt=task.subtasks&&task.subtasks.find(s=>s.id===activeStId);

  return h('div',{className:'modal-backdrop',onClick:onClose},
    h('div',{className:'modal task-modal',onClick:e=>e.stopPropagation()},
      h('div',{className:'task-modal-main'},
        h('div',{className:'task-modal-header'},
          h('div',{style:{flex:1,marginRight:24}},
            h('div',{className:'task-id'},
              h('div',{className:'task-id-dot',style:{backgroundColor:theme.primary}}),
              'TASK-'+task.id.substring(0,4).toUpperCase()

            h('input',{className:'task-title-big',value:task.title,onChange:e=>onUpdate({...task,title:e.target.value})})
          ),
          h('div',{className:'flex items-center gap8'},
            h('button',{className:'btn-del-task',onClick:e=>{e.stopPropagation();onDelete();}},
              h(Icon,{name:'trash',size:16}),t.deleteTask
            ),
            h('button',{className:'btn-close',onClick:onClose},h(Icon,{name:'x',size:22}))
          )
        ),
        h('div',{className:'task-modal-body'},
          h('div',{className:'mb24'},
            h('div',{className:'flex justify-between items-center mb8'},
              h('span',{className:'section-title'},h(Icon,{name:'check-square',size:16}),t.completion),
              h('span',{className:'progress-pct',style:{color:theme.primary}},progress+'%')
            ),
            h('div',{className:'progress-bar-wrap'},
              h('div',{className:'progress-bar',style:{width:progress+'%',backgroundColor:theme.primary}})
            )
          ),
          h('div',{className:'mb24'},
            h('div',{className:'section-title mb8'},h(Icon,{name:'file-text',size:16}),t.details),
            h('textarea',{className:'details-textarea',placeholder:t.addDetailsPrompt,value:task.description||'',onChange:e=>onUpdate({...task,description:e.target.value})})
          ),
          h('div',null,
            h('div',{className:'section-title mb8'},h(Icon,{name:'list-todo',size:16}),t.subtasks),
            h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
              (task.subtasks||[]).map((st,idx)=>
                h('div',{key:st.id,draggable:draggable===st.id,
                  onDragStart:e=>onDragStart(e,st.id),
                  onDragOver:e=>e.preventDefault(),
                  onDrop:e=>onDrop(e,idx),
                  className:'subtask-row'+(st.completed?' done':'')},
                  h('div',{className:'drag-handle',
                    onMouseEnter:()=>setDraggable(st.id),
                    onMouseLeave:()=>setDraggable(null)},
                    h(Icon,{name:'grip-vertical',size:15})
                  ),
                  h('button',{className:'subtask-check'+(st.completed?' checked':''),onClick:()=>toggleSt(st.id)},
                    st.completed&&h(Icon,{name:'check',size:13})
                  ),
                  h('input',{className:'subtask-input'+(st.completed?' done-text':''),
                    autoFocus:st.title==='',value:st.title,
                    placeholder:'Type a subtask...',
                    onKeyDown:e=>{if(e.key==='Enter'){e.preventDefault();addSubtask();}},
                    onChange:e=>updateSt({...st,title:e.target.value})

                  st.dueDate&&h('div',{className:'due-badge'},h(Icon,{name:'calendar',size:11}),st.dueDate),

                  h('div',{className:'subtask-actions'},
                    h('button',{className:'btn-subtask-action del',onClick:()=>deleteSt(st.id)},h(Icon,{name:'trash',size:14})),
                    h('button',{className:'btn-subtask-action expand',onClick:()=>setActiveStId(activeStId===st.id?null:st.id)},h(Icon,{name:'maximize-2',size:14}))
                  )
                )
              ),
              h('button',{className:'btn-add-subtask',onClick:addSubtask},
                h(Icon,{name:'plus',size:15}),t.subtasks
              )
            )
          )
        )
      ),
      activeSt&&h(Fragment,null,
        h('div',{style:{
          position:'absolute', top:0, left:0, right:0, bottom:0,
          zIndex:59, background:'rgba(255,255,255,0.01)'
        }, onClick:()=>setActiveStId(null)}),
        h('div',{className:'subtask-panel'},
          h('div',{className:'subtask-panel-header'},
            h('span',{className:'section-title'},h(Icon,{name:'align-left',size:15}),t.details),
            h('button',{className:'btn-close',onClick:()=>setActiveStId(null)},h(Icon,{name:'x',size:16}))
          ),
          h('div',{className:'subtask-panel-body'},
            h('div',null,
              h('div',{className:'field-label'},activeSt.title||'Subtask'),
              h('textarea',{className:'subtask-notes',placeholder:t.addDetailsPrompt,value:activeSt.details||'',onChange:e=>updateSt({...activeSt,details:e.target.value})})
            ),
            h('div',null,
              h('div',{className:'field-label'},h(Icon,{name:'calendar',size:13}),t.dueDate),
              h('input',{type:'date',className:'date-input',value:activeSt.dueDate||'',onChange:e=>updateSt({...activeSt,dueDate:e.target.value})})
            )
          )
        )
      )
    )
  );
}

function KanbanColumn({column,tasks,onDropTask,onUpdateColumn,onDeleteColumn,onTaskClick,onAddTask,t,theme}){
  const handleDragStart = (e, id) => {
    e.dataTransfer.setData('text/plain', 'task:'+id);
    e.dataTransfer.effectAllowed = 'move';
    e.target.style.opacity = '0.45';
  };
  const handleDragEnd = (e) => {
    e.target.style.opacity = '1';
  };
  const handleColumnDrop = (e) => {
    e.preventDefault();
    const raw = e.dataTransfer.getData('text/plain');
    if(!raw) return;
    const [type, taskId] = raw.split(':');
    if(type==='task' && taskId) onDropTask(taskId, column.id, null);
  };
  const handleTaskDrop = (e, idx) => {
    e.stopPropagation(); e.preventDefault();
    const raw = e.dataTransfer.getData('text/plain');
    if(!raw) return;
    const [type, taskId] = raw.split(':');
    if(type==='task' && taskId) onDropTask(taskId, column.id, idx);
  };

  return h('div',{className:'column',
    onDragOver:e=>{e.preventDefault(); e.dataTransfer.dropEffect = 'move';},
    onDrop:handleColumnDrop},
    h('div',{className:'col-header'},
      h('div',{className:'col-title-wrap'},
        h('input',{className:'col-title',value:column.title,
          onKeyDown:e=>e.key==='Enter'&&e.target.blur(),
          onChange:e=>onUpdateColumn({...column,title:e.target.value})
        })
      ),
      h('span',{className:'col-count'},tasks.length),
      h('button',{className:'btn-del-col',onClick:e=>{e.stopPropagation();onDeleteColumn(column.id);}},h(Icon,{name:'trash',size:13}))
    ),
    h('div',{className:'tasks-list'},
      tasks.map((task,idx)=>{
        const prog=calcProgress(task);
        return h('div',{key:task.id,draggable:true,
          onDragStart:e=>handleDragStart(e,task.id),
          onDragEnd:handleDragEnd,
          onDrop:e=>handleTaskDrop(e,idx),
          onDragOver:e=>{e.preventDefault(); e.dataTransfer.dropEffect = 'move';},
          onClick:()=>onTaskClick(task),
          className:'task-card'},
          h('div',{className:'task-accent',style:{backgroundColor:theme.primary}}),
          h('div',{className:'task-content'},
            h('div',{className:'task-title'},task.title),
            h('div',{className:'task-meta'},
              h('div',{className:'task-subtask-count'},
                h(Icon,{name:prog===100?'check-circle':'circle',size:13,style:prog===100?{color:'#22c55e'}:{}}),
                h('span',null,(task.subtasks||[]).length)
              ),
              h('span',{style:{fontFamily:'monospace',fontSize:11,color:theme.primary}},prog+'%')
            )
          )
        );
      }),
      h('button',{className:'btn-add-task',onClick:()=>onAddTask(column.id)},
        h(Icon,{name:'plus',size:15}),t.addTask
      )
    )
  );
}


function DueNotification({items,onDismiss,theme}){
  if(!items||items.length===0) return null;
  const lang = T[theme] || T.en; // theme here is actually the language code
  const t = T[lang] || T.en;
  return h('div',{className:'due-notification'},
    h('h4',null, h(Icon,{name:'bell',size:16,style:{color:'#92400e'}}), t.dueToday),
    h('ul',null,
  items.map((item, idx) =>
    h('li',{key:idx},
      h('span',{style:{fontWeight:600}}, item.subtaskTitle),
      ' — ',
      item.taskTitle,
      ' (', item.boardName, ')',
      h('span',{style:{marginLeft:8,fontSize:12,color:'#b45309'}}, item.remaining)
    )
  )
),
    h('button',{onClick:onDismiss}, 'OK')
  );
}

function CelebrationOverlay({onDone}){
  const [visible, setVisible] = useState(true);
  useEffect(() => {
    const timer = setTimeout(() => { setVisible(false); onDone && onDone(); }, 2500);
    return () => clearTimeout(timer);
  }, []);

  if (!visible) return null;

  // Generate random confetti pieces and emoji positions
  const pieces = Array.from({length: 60}, (_, i) => {
    const left = Math.random() * 100;
    const delay = Math.random() * 0.8;
    const duration = 1.5 + Math.random() * 1.5;
    const size = 6 + Math.random() * 8;
    const color = ['#fbbf24','#f97316','#ef4444','#8b5cf6','#22c55e','#0ea5e9'][i % 6];
    return h('div',{key:i, style:{
      position:'absolute', left:left+'%', top:'-10%',
      width:size+'px', height:size+'px', backgroundColor:color,
      borderRadius: size>8 ? '2px' : '50%',
      opacity:0.9,
      animation: `confettiFall ${duration}s ease-in ${delay}s forwards`,
      zIndex:9999
    }});
  });

  const emojis = ['✨','🥳','🎈','🎉','🎊','🎇'];
  const emojiElements = emojis.map((emoji, i) => {
    const left = 15 + i * 12;
    const delay = i * 0.15;
    return h('div',{key:'e'+i, style:{
      position:'absolute', left:left+'%', top:'-20%',
      fontSize:36 + (i%3)*8,
      animation: `emojiDrop 2s ease-out ${delay}s forwards`,
      zIndex:10000, pointerEvents:'none'
    }}, emoji);
  });

  return h('div',{className:'celebration-overlay', style:{
    position:'fixed', inset:0, pointerEvents:'none', zIndex:2000, overflow:'hidden'
  }},
    pieces,
    emojiElements,
    h('style',null,`
      @keyframes confettiFall {
        0% { transform: translateY(0) rotate(0deg); opacity:1; }
        100% { transform: translateY(110vh) rotate(720deg); opacity:0; }
      }
      @keyframes emojiDrop {
        0% { transform: translateY(0) scale(0); opacity:1; }
        60% { transform: translateY(40vh) scale(1.4); opacity:1; }
        100% { transform: translateY(100vh) scale(0.8); opacity:0; }
      }
    `)
  );
}

function App(){
  const[boards,setBoards]=useState([]);
  const[activeBoardId,setActiveBoardId]=useState(null);
  const[activeTask,setActiveTask]=useState(null);
  const[lang,setLang]=useState('en');
  const[collapsed,setCollapsed]=useState(false);
  const[showImport,setShowImport]=useState(false);
  const[showTheme,setShowTheme]=useState(false);
  const[showInfo,setShowInfo]=useState(false);
  const[importText,setImportText]=useState('');
  const[importMode,setImportMode]=useState('paste');
  const[selectedFile,setSelectedFile]=useState('');
  const[confirm,setConfirm]=useState({isOpen:false,message:'',onConfirm:null});
  const[undoSnap,setUndoSnap]=useState(null);
  const[celebrateTaskId, setCelebrateTaskId] = useState(null);
  const[dismissedDue, setDismissedDue] = useState(false);
  const boardAreaRef = useRef(null);

  const t=T[lang];

  useEffect(()=>{
    const saved=localStorage.getItem('taskflow_data_v3');
    if(saved){
      const p=JSON.parse(saved);
      setBoards(p.boards||[]);
      setLang(p.settings?.lang||'en');
    } else {
      const demo={id:genId(),name:'Welcome Project',themeId:'classic',columns:[
        {id:'c1',title:'To Do',tasks:[]},
        {id:'c2',title:'In Progress',tasks:[]}
      ]};
      setBoards([demo]);
      setActiveBoardId(demo.id);
    }
  },[]);

  useEffect(()=>{
    localStorage.setItem('taskflow_data_v3',JSON.stringify({boards,settings:{lang}}));
  },[boards,lang]);

  useEffect(()=>{
    if(!undoSnap)return;
    const timer=setTimeout(()=>setUndoSnap(null),7000);
    return()=>clearTimeout(timer);
  },[undoSnap]);

  const activeBoard=useMemo(()=>boards.find(b=>b.id===activeBoardId),[boards,activeBoardId]);
  const theme=useMemo(()=>activeBoard?(THEMES.find(t=>t.id===activeBoard.themeId)||THEMES[0]):THEMES[0],[activeBoard]);

  // Compute due subtasks for the active board
  const dueTodayItems = useMemo(() => {
  if (!activeBoard) return [];
  const now = Date.now();
  const in48h = now + 48 * 60 * 60 * 1000; // exactly 48 hours from now
  const items = [];
  activeBoard.columns.forEach(col => {
    col.tasks.forEach(task => {
      (task.subtasks||[]).forEach(st => {
        if (st.dueDate && !st.completed) {
          const due = new Date(st.dueDate);
          if (!isNaN(due.getTime())) {
            const dueTime = due.getTime();
            if (dueTime >= now && dueTime <= in48h) {
              // compute a human-readable remaining time
              const diffMs = dueTime - now;
              const diffHours = Math.round(diffMs / (1000 * 60 * 60));
              let remaining;
              if (diffHours <= 1) remaining = 'in 1 hour';
              else if (diffHours < 24) remaining = `in ${diffHours} hours`;
              else {
                const days = Math.floor(diffHours / 24);
                remaining = `in ${days} day${days > 1 ? 's' : ''}`;
              }
              items.push({
                subtaskTitle: st.title || '(untitled)',
                taskTitle: task.title,
                boardName: activeBoard.name,
                remaining
              });
            }
          }
        }
      });
    });
  });
  return items;
}, [activeBoard]);

  // Show notification when board changes and due items exist
  useEffect(() => {
    setDismissedDue(false);
  }, [activeBoardId]);

  const askConfirm=(msg,fn)=>setConfirm({isOpen:true,message:msg,onConfirm:fn});
  const closeConfirm=()=>setConfirm(c=>({...c,isOpen:false}));

  const updateBoard=b=>setBoards(prev=>prev.map(x=>x.id===b.id?b:x));

  const createBoard=()=>{
    const b={id:genId(),name:t.newBoardName,themeId:THEMES[Math.floor(Math.random()*THEMES.length)].id,
      columns:[{id:genId(),title:'To Do',tasks:[]},{id:genId(),title:'Doing',tasks:[]}]};
    setBoards(prev=>[...prev,b]);setActiveBoardId(b.id);
  };

  const deleteBoard=id=>askConfirm(t.confirmDelete,()=>{
    setBoards(prev=>prev.filter(b=>b.id!==id));
    if(activeBoardId===id)setActiveBoardId(null);
  });

  const addTask=colId=>{
    if(!activeBoard)return;
    const task={id:genId(),title:t.newTaskName,description:'',subtasks:[]};
    updateBoard({...activeBoard,columns:activeBoard.columns.map(c=>c.id===colId?{...c,tasks:[...c.tasks,task]}:c)});
  };

  const dropTask=(taskId,targetColId,targetIdx)=>{
    if(!activeBoard)return;
    let moved=null;
    const copy=JSON.parse(JSON.stringify(activeBoard));
    copy.columns.forEach(c=>{const i=c.tasks.findIndex(t=>t.id===taskId);if(i>-1){moved=c.tasks[i];c.tasks.splice(i,1);}});
    if(!moved)return;
    const tc=copy.columns.find(c=>c.id===targetColId);
    if(tc){targetIdx!==null&&targetIdx>=0?tc.tasks.splice(targetIdx,0,moved):tc.tasks.push(moved);}
    updateBoard(copy);
  };

  const updateTask=ut=>{
  const oldTask = activeBoard?.columns.flatMap(c=>c.tasks).find(t=>t.id===ut.id);
  const oldProgress = oldTask ? calcProgress(oldTask) : 0;
  const newProgress = calcProgress(ut);
  updateBoard({...activeBoard,columns:activeBoard.columns.map(c=>({...c,tasks:c.tasks.map(t=>t.id===ut.id?ut:t)}))});
  setActiveTask(ut);
  // Trigger celebration when progress changes from less than 100 to 100
  if (oldProgress < 100 && newProgress === 100) {
    setCelebrateTaskId(ut.id);
    setTimeout(() => setCelebrateTaskId(null), 3000);
  }
};

  const deleteTask=()=>{
    if(!activeTask)return;
    askConfirm(t.confirmDelete,()=>{
      updateBoard({...activeBoard,columns:activeBoard.columns.map(c=>({...c,tasks:c.tasks.filter(t=>t.id!==activeTask.id)}))});
      setActiveTask(null);
    });
  };

  const deleteColumn=colId=>askConfirm(t.confirmDelete,()=>{
    updateBoard({...activeBoard,columns:activeBoard.columns.filter(c=>c.id!==colId)});
  });

  const exportMD=()=>{
    if(!activeBoard)return;
    let md=`# ${activeBoard.name}\n> Theme: ${activeBoard.themeId}\n\n`;
    activeBoard.columns.forEach(col=>{
      md+=`## ${col.title}\n`;
      col.tasks.forEach(task=>{
        md+=`### ${task.title}\n`;
        if(task.description)md+=`> description: ${task.description.replace(/\n/g,'\\n')}\n`;
        (task.subtasks||[]).forEach(st=>{
          md+=`- [${st.completed?'x':' '}] ${st.title}\n`;
          if(st.details)md+=`  > details: ${st.details.replace(/\n/g,'\\n')}\n`;
          if(st.dueDate)md+=`  > due: ${st.dueDate}\n`;
        });
        md+='\n';
      });
    });
    const a=document.createElement('a');
    a.href='data:text/markdown;charset=utf-8,'+encodeURIComponent(md);
    a.download=`${activeBoard.name}_board.md`;a.click();
  };

  const doImport=()=>{
    if(!importText.trim())return;
    const{board,errors}=parseMD(importText);
    if(errors&&errors.length){alert('Import failed:\n'+errors.join('\n'));return;}
    if(!board)return;
    const snap={boards:JSON.parse(JSON.stringify(boards)),activeBoardId};
    setBoards(prev=>[...prev,board]);setActiveBoardId(board.id);
    setShowImport(false);setImportText('');setUndoSnap(snap);
  };

  const undoImport=()=>{
    if(!undoSnap)return;
    setBoards(undoSnap.boards);setActiveBoardId(undoSnap.activeBoardId);setUndoSnap(null);
  };

  const addColumn = () => {
    if (!activeBoard) return;
    const newCol = { id: genId(), title: t.newColumnName, tasks: [] };
    updateBoard({ ...activeBoard, columns: [...activeBoard.columns, newCol] });
    setTimeout(() => {
      if (boardAreaRef.current) {
        boardAreaRef.current.scrollLeft = boardAreaRef.current.scrollWidth;
      }
    }, 100);
  };

  return h('div',{className:'app',style:{backgroundColor:activeBoard?theme.bg:'#f9fafb'},onContextMenu:e=>e.preventDefault()},
    h(Sidebar,{boards,activeBoardId,onSelect:setActiveBoardId,onCreate:createBoard,onDelete:deleteBoard,
      isCollapsed:collapsed,toggleCollapse:()=>setCollapsed(c=>!c),t,toggleLang:()=>setLang(l=>l==='en'?'fr':'en'),
      showInfo,onToggleInfo:()=>setShowInfo(prev=>!prev),theme}),
    h('div',{className:'main',onContextMenu:e=>e.preventDefault()},
      undoSnap&&h('div',{className:'undo-banner'},
        h('span',null,'Board imported. You can undo to revert.'),
        h('button',{className:'btn-undo',onClick:undoImport},'Undo')
      ),
      activeBoard?h(Fragment,null,
        h('div',{className:'topbar'},
          h('div',{className:'flex items-center gap8'},
            h('input',{className:'board-title-input',style:{color:theme.text},value:activeBoard.name,
              onChange:e=>updateBoard({...activeBoard,name:e.target.value})}),
            h('button',{className:'btn-theme',style:{backgroundColor:theme.primary+'22',color:theme.primary},onClick:()=>setShowTheme(true)},
              h(Icon,{name:'palette',size:13}),t.theme
            )
          ),
          h('div',{className:'topbar-actions'},
            h('button',{className:'btn-icon',title:t.import,onClick:()=>setShowImport(true)},h(Icon,{name:'upload',size:17})),
            h('button',{className:'btn-icon',title:t.export,onClick:exportMD},h(Icon,{name:'download',size:17}))
          )
        ),
        h('div',{className:'board-area',ref:boardAreaRef},
          h('div',{className:'columns-wrap'},
            activeBoard.columns.map(col=>
              h(KanbanColumn,{key:col.id,column:col,tasks:col.tasks,onDropTask:dropTask,
                onUpdateColumn:uc=>updateBoard({...activeBoard,columns:activeBoard.columns.map(c=>c.id===uc.id?uc:c)}),
                onDeleteColumn:deleteColumn,onTaskClick:setActiveTask,onAddTask:addTask,t,theme})
            ),
            h('button',{className:'btn-add-col',title:t.addColumn, onClick: addColumn},
              h('div',{className:'btn-add-col-inner'},h(Icon,{name:'plus',size:22}))
            ),
            h('div',{style:{width:16,flexShrink:0}})
          )
        )
      ):h('div',{className:'welcome'},
        h('div',{className:'welcome-icon'},h(Icon,{name:'layout',size:40,style:{color:'#9ca3af'}})),
        h('h2',null,t.welcomeTitle),
        h('p',null,t.welcomeSubtitle)
      ),
      activeTask&&h(TaskModal,{task:activeTask,onClose:()=>setActiveTask(null),onUpdate:updateTask,onDelete:deleteTask,t,theme}),
      showTheme&&activeBoard&&h(ThemePicker,{currentThemeId:activeBoard.themeId,onSelect:id=>updateBoard({...activeBoard,themeId:id}),onClose:()=>setShowTheme(false),t}),
      showImport&&h('div',{className:'modal-backdrop',onClick:()=>setShowImport(false)},
        h('div',{className:'modal import-modal',onClick:e=>e.stopPropagation()},
          h('div',{className:'import-tabs'},
            h('button',{className:'import-tab'+(importMode==='paste'?' active':''),onClick:()=>setImportMode('paste')},'Paste Markdown'),
            h('button',{className:'import-tab'+(importMode==='file'?' active':''),onClick:()=>setImportMode('file')},'MD File')
          ),
          importMode==='paste'
            ?h('textarea',{className:'import-textarea',placeholder:t.importPlaceholder,value:importText,onChange:e=>setImportText(e.target.value)})
            :h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
                h('input',{type:'file',className:'file-input',accept:'.md,.markdown',onChange:e=>{
                  const f=e.target.files?.[0];if(!f)return;
                  setSelectedFile(f.name);
                  const r=new FileReader();r.onload=ev=>setImportText(ev.target?.result||'');r.readAsText(f);
                }}),
                selectedFile&&h('span',{style:{fontSize:12,color:'#6b7280'}},'Selected: '+selectedFile)
              ),
          h('div',{className:'import-actions'},
            h('button',{className:'btn-cancel',onClick:()=>setShowImport(false)},t.cancel),
            h('button',{className:'btn-primary',onClick:doImport},t.importAction)
          )
        )
      ),
      h(ConfirmModal,{isOpen:confirm.isOpen,message:confirm.message,onConfirm:confirm.onConfirm,onCancel:closeConfirm,t}),
      showInfo&&h('div',{className:'info-overlay',onClick:()=>setShowInfo(false)},
        h('div',{className:'info-dialog',onClick:e=>e.stopPropagation()},
          h('div',null,h('strong',null,'Creator:'),' Noble Adounkpe'),
          h('div',{style:{marginTop:12}},h('strong',null,'About:'),' TaskFlow is the perfect combination of a Kanban board and a task list. You get to organize different tasks you\'d like carried out into subtasks, then into dedicated task lists.'),
          h('button',{onClick:()=>setShowInfo(false)},'Got it')
        )
      ),
      // Due notification popup (only if board active and not dismissed)
      activeBoard && !dismissedDue && dueTodayItems.length > 0 &&
        h(DueNotification,{items:dueTodayItems, onDismiss:()=>setDismissedDue(true), lang}),
      // 🎉 Celebration overlay
      celebrateTaskId && h(CelebrationOverlay,{onDone:()=>setCelebrateTaskId(null)})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
